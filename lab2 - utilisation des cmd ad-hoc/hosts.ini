vlan_playbook.ymal
---
- name: Create VLAN 100 and configure ports
  hosts: switches
  gather_facts: no
  tasks:
  
   - name: Create VLAN 100
     ios_config:
      lines:
        - vlan 100
        - name VLAN100
        
    - name: Configure GigabitEthernet3/1 for VLAN 100
      ios_config:
        parents:
          - interface GigabitEthernet3/1
        lines:
          - switchport mode access
          - switchport access vlan 100
          
     - name: Configure GigabitEthernet3/2 for VLAN 100
       ios_config:
       parents:
         - interface GigabitEthernet3/2
       lines:
         - switchport mode access
         - switchport access vlan 100
